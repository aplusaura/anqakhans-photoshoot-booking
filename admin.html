<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnQa Khans - Booking Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #EFE3CC;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(217, 199, 168, 0.2);
            padding-bottom: 20px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #D9C7A8;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(10, 14, 39, 0.95);
            border: 1px solid rgba(217, 199, 168, 0.2);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: 700;
            color: #D9C7A8;
            margin: 10px 0;
        }

        .stat-card .label {
            font-size: 12px;
            color: #B8AB93;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bookings-table {
            background: rgba(10, 14, 39, 0.95);
            border: 1px solid rgba(217, 199, 168, 0.2);
            border-radius: 8px;
            overflow: hidden;
        }

        .table-header {
            background: rgba(217, 199, 168, 0.1);
            padding: 20px;
            border-bottom: 1px solid rgba(217, 199, 168, 0.2);
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr 150px;
            gap: 15px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
            color: #D9C7A8;
        }

        .booking-row {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(217, 199, 168, 0.1);
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr 150px;
            gap: 15px;
            align-items: center;
            font-size: 13px;
        }

        .booking-row:hover {
            background: rgba(217, 199, 168, 0.05);
        }

        .booking-row:last-child {
            border-bottom: none;
        }

        .brand-name {
            font-weight: 600;
            color: #EFE3CC;
        }

        .contact-info {
            font-size: 12px;
            color: #B8AB93;
            line-height: 1.4;
        }

        .shoot-date {
            color: #D9C7A8;
            font-weight: 500;
        }

        .action-btn {
            padding: 6px 12px;
            background: rgba(217, 199, 168, 0.2);
            border: 1px solid rgba(217, 199, 168, 0.3);
            border-radius: 4px;
            color: #D9C7A8;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .action-btn:hover {
            background: rgba(217, 199, 168, 0.3);
            border-color: #D9C7A8;
        }

        .empty-state {
            padding: 40px;
            text-align: center;
            color: #B8AB93;
        }

        .empty-state svg {
            width: 60px;
            height: 60px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: rgba(10, 14, 39, 0.98);
            border: 1px solid rgba(217, 199, 168, 0.2);
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            width: 90%;
        }

        .modal-header {
            border-bottom: 1px solid rgba(217, 199, 168, 0.2);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: #D9C7A8;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modal-close {
            float: right;
            background: none;
            border: none;
            color: #D9C7A8;
            font-size: 24px;
            cursor: pointer;
        }

        .detail-item {
            margin-bottom: 15px;
        }

        .detail-label {
            font-size: 11px;
            color: #B8AB93;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .detail-value {
            color: #EFE3CC;
            font-size: 14px;
            line-height: 1.5;
        }

        .refresh-btn {
            padding: 8px 16px;
            background: rgba(217, 199, 168, 0.2);
            border: 1px solid rgba(217, 199, 168, 0.3);
            border-radius: 4px;
            color: #D9C7A8;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }

        .refresh-btn:hover {
            background: rgba(217, 199, 168, 0.3);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #B8AB93;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(217, 199, 168, 0.2);
            border-top-color: #D9C7A8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 1000px) {
            .table-header,
            .booking-row {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .table-header {
                display: none;
            }

            .booking-row {
                border: 1px solid rgba(217, 199, 168, 0.2);
                border-radius: 8px;
                margin-bottom: 12px;
                padding: 16px;
            }

            .booking-row::before {
                content: attr(data-label);
                display: inline-block;
                font-weight: 600;
                color: #D9C7A8;
                font-size: 11px;
                text-transform: uppercase;
                width: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Booking Dashboard</h1>
            <button class="refresh-btn" id="refreshBtn">🔄 Refresh</button>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="label">Total Bookings</div>
                <div class="number" id="totalBookings">0</div>
            </div>
            <div class="stat-card">
                <div class="label">This Month</div>
                <div class="number" id="monthBookings">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Pending Review</div>
                <div class="number" id="pendingBookings">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Unique Brands</div>
                <div class="number" id="uniqueBrands">0</div>
            </div>
        </div>

        <div class="bookings-table">
            <div class="table-header">
                <div>Brand</div>
                <div>Contact</div>
                <div>Email / Phone</div>
                <div>Shoot Date</div>
                <div>Location</div>
                <div>Action</div>
            </div>
            <div id="bookingsContainer"></div>
        </div>
    </div>

    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <button class="modal-close" onclick="closeModal()">×</button>
                <h2>Booking Details</h2>
            </div>
            <div id="detailsBody"></div>
        </div>
    </div>

    <script>
        // Demo data - في الواقع، هذه البيانات ستأتي من Netlify API
        let bookingsData = [];

        // Load bookings from localStorage (demo purposes)
        function loadBookings() {
            const saved = localStorage.getItem('anqakhans_bookings');
            if (saved) {
                bookingsData = JSON.parse(saved);
            } else {
                // Demo data
                bookingsData = [
                    {
                        id: 1,
                        brandName: 'Luma Skincare',
                        contactPerson: 'Sarah Ahmed',
                        email: 'sarah@luma.com',
                        phone: '+20 100 123 4567',
                        unit: 'Unit 4B - New Cairo',
                        shootDate: '2026-07-15',
                        teamSize: 5,
                        purpose: 'Skincare Campaign',
                        notes: 'Product photography for social media',
                        submittedAt: new Date('2026-06-24').toISOString()
                    }
                ];
                localStorage.setItem('anqakhans_bookings', JSON.stringify(bookingsData));
            }
            renderDashboard();
        }

        function renderDashboard() {
            updateStats();
            renderBookings();
        }

        function updateStats() {
            const now = new Date();
            const currentMonth = now.getMonth();
            const currentYear = now.getFullYear();

            const totalBookings = bookingsData.length;
            const monthBookings = bookingsData.filter(b => {
                const date = new Date(b.submittedAt);
                return date.getMonth() === currentMonth && date.getFullYear() === currentYear;
            }).length;

            const uniqueBrands = new Set(bookingsData.map(b => b.brandName)).size;

            document.getElementById('totalBookings').textContent = totalBookings;
            document.getElementById('monthBookings').textContent = monthBookings;
            document.getElementById('pendingBookings').textContent = totalBookings;
            document.getElementById('uniqueBrands').textContent = uniqueBrands;
        }

        function renderBookings() {
            const container = document.getElementById('bookingsContainer');

            if (bookingsData.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 12h6m-6 4h6M5 8h14a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2v-8a2 2 0 012-2z"></path>
                        </svg>
                        <h3>No bookings yet</h3>
                        <p>New booking requests will appear here</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = bookingsData.map(booking => `
                <div class="booking-row">
                    <div class="brand-name">${booking.brandName}</div>
                    <div>${booking.contactPerson}</div>
                    <div class="contact-info">
                        <div>${booking.email}</div>
                        <div>${booking.phone}</div>
                    </div>
                    <div class="shoot-date">${new Date(booking.shootDate).toLocaleDateString('ar-EG')}</div>
                    <div>${booking.unit}</div>
                    <div>
                        <button class="action-btn" onclick="viewDetails(${booking.id})">View</button>
                    </div>
                </div>
            `).join('');
        }

        function viewDetails(id) {
            const booking = bookingsData.find(b => b.id === id);
            if (!booking) return;

            const detailsBody = document.getElementById('detailsBody');
            detailsBody.innerHTML = `
                <div class="detail-item">
                    <div class="detail-label">Brand Name</div>
                    <div class="detail-value">${booking.brandName}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Contact Person</div>
                    <div class="detail-value">${booking.contactPerson}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Email</div>
                    <div class="detail-value">${booking.email}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Phone</div>
                    <div class="detail-value">${booking.phone}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Studio / Location</div>
                    <div class="detail-value">${booking.unit}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Shoot Date</div>
                    <div class="detail-value">${new Date(booking.shootDate).toLocaleDateString('ar-EG')}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Team Size</div>
                    <div class="detail-value">${booking.teamSize} members</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Purpose</div>
                    <div class="detail-value">${booking.purpose || 'Not specified'}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Additional Notes</div>
                    <div class="detail-value">${booking.notes || 'None'}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Submitted</div>
                    <div class="detail-value">${new Date(booking.submittedAt).toLocaleString('ar-EG')}</div>
                </div>
            `;

            document.getElementById('detailModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('show');
        }

        document.getElementById('refreshBtn').addEventListener('click', () => {
            loadBookings();
        });

        // Intercept form submissions and store in localStorage
        if (window.location.pathname === '/') {
            const form = document.querySelector('form[name="anqakhans-booking"]');
            if (form) {
                form.addEventListener('submit', (e) => {
                    const newBooking = {
                        id: bookingsData.length + 1,
                        brandName: document.getElementById('brandName')?.value,
                        contactPerson: document.getElementById('contactPerson')?.value,
                        email: document.getElementById('email')?.value,
                        phone: document.getElementById('phone')?.value,
                        unit: document.getElementById('unit')?.value,
                        shootDate: document.getElementById('shootDate')?.value,
                        teamSize: document.getElementById('teamSize')?.value,
                        purpose: document.getElementById('purpose')?.value,
                        notes: document.getElementById('notes')?.value,
                        submittedAt: new Date().toISOString()
                    };
                    bookingsData.push(newBooking);
                    localStorage.setItem('anqakhans_bookings', JSON.stringify(bookingsData));
                });
            }
        }

        // Initial load
        loadBookings();

        // Refresh every 30 seconds
        setInterval(loadBookings, 30000);
    </script>
</body>
</html>
