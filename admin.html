<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnQa Khans - Agreement Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #D9C7A8;
            --primary-light: #EFE3CC;
            --primary-dark: #B8AB93;
            --bg: #f8fafc;
            --bg-white: #ffffff;
            --text: #1f2937;
            --text-light: #6b7280;
            --border: #e5e7eb;
            --dark-bg: #1a1a1a;
            --accent: #ef4444;
            --success: #10b981;
        }

        body {
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #f1f5f9 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, var(--bg) 0%, #f1f5f9 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .login-screen.hidden {
            display: none;
        }

        .login-box {
            background: var(--bg-white);
            border: 1.5px solid var(--border);
            border-radius: 16px;
            padding: 50px 40px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .login-box h1 {
            font-size: 28px;
            color: var(--primary);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .login-box p {
            color: var(--text-light);
            margin-bottom: 30px;
            font-size: 13px;
        }

        .login-field {
            margin-bottom: 20px;
        }

        .login-field label {
            display: block;
            font-size: 12px;
            color: var(--text);
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .login-field input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
        }

        .login-field input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(217, 199, 168, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(217, 199, 168, 0.4);
        }

        .login-error {
            color: var(--accent);
            font-size: 12px;
            margin-top: 10px;
            display: none;
        }

        .login-error.show {
            display: block;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 16px;
            background: var(--bg-white);
            border: 1.5px solid var(--border);
            border-radius: 6px;
            color: var(--primary);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .btn.logout {
            background: transparent;
            color: var(--accent);
            border-color: rgba(239, 68, 68, 0.3);
        }

        .btn.logout:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .agreements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .agreement-card {
            background: var(--bg-white);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .agreement-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(217, 199, 168, 0.1);
        }

        .agreement-date {
            font-size: 12px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .agreement-status {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 15px;
        }

        .signature-badge {
            font-size: 11px;
            padding: 6px 10px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .agreement-card h3 {
            font-size: 14px;
            color: var(--primary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .signature-preview {
            width: 100%;
            height: 80px;
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 12px;
            background: #fafafa;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--text-light);
        }

        .signature-preview img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 4px;
        }

        .view-btn {
            width: 100%;
            padding: 8px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        .view-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(217, 199, 168, 0.3);
        }

        .empty-state {
            padding: 60px 40px;
            text-align: center;
            color: var(--text-light);
            background: var(--bg-white);
            border-radius: 12px;
            border: 1.5px solid var(--border);
        }

        .empty-state h3 {
            font-size: 18px;
            color: var(--text);
            margin-bottom: 8px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 9998;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--bg-white);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 36px;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .modal-header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 18px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            color: var(--primary);
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 28px;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .modal-close:hover {
            color: var(--accent);
        }

        .signature-display {
            margin-bottom: 24px;
            padding: 20px;
            background: var(--bg);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .signature-display h3 {
            font-size: 12px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .signature-display img {
            width: 100%;
            max-height: 200px;
            border: 1px solid var(--border);
            border-radius: 6px;
        }

        .signature-date {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 8px;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 20px;
            background: var(--success);
            color: white;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            animation: slideInRight 0.4s ease-out;
            z-index: 10000;
        }

        .notification.error {
            background: var(--accent);
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @media (max-width: 700px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .modal-content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h1>🔐 Admin Access</h1>
            <p>Enter password to access agreements</p>

            <div class="login-field">
                <label for="passwordInput">Admin Password</label>
                <input
                    type="password"
                    id="passwordInput"
                    placeholder="Enter password"
                    autocomplete="off"
                >
            </div>

            <button class="login-btn" onclick="checkPassword()">Login</button>

            <div class="login-error" id="loginError">❌ Incorrect password</div>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div class="container" id="dashboard" style="display: none;">
        <div class="header">
            <h1>📋 Agreements</h1>
            <div class="header-actions">
                <button class="btn" onclick="refreshData()">🔄 Refresh</button>
                <button class="btn logout" onclick="logout()">🚪 Logout</button>
            </div>
        </div>

        <div id="agreementsContainer"></div>
    </div>

    <!-- Detail Modal -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Agreement Details</h2>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div id="detailsBody"></div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = 'anqakhans2026';
        let agreementsData = [];

        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            const loginError = document.getElementById('loginError');

            if (input === ADMIN_PASSWORD) {
                sessionStorage.setItem('adminLoggedIn', 'true');
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadAgreements();
            } else {
                loginError.classList.add('show');
                document.getElementById('passwordInput').value = '';
                setTimeout(() => loginError.classList.remove('show'), 3000);
            }
        }

        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('passwordInput').value = '';
        }

        function loadAgreements() {
            const saved = localStorage.getItem('anqakhans_agreements');
            agreementsData = saved ? JSON.parse(saved) : [];
            renderAgreements();
        }

        function renderAgreements() {
            const container = document.getElementById('agreementsContainer');

            if (agreementsData.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 48px; margin-bottom: 16px;">📋</div>
                        <h3>No signed agreements yet</h3>
                        <p>Signed agreements will appear here</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="agreements-grid">
                    ${agreementsData
                        .sort((a, b) => new Date(b.submittedAt) - new Date(a.submittedAt))
                        .map(agreement => `
                            <div class="agreement-card" onclick="viewAgreement(${agreement.id})">
                                <div class="agreement-date">${new Date(agreement.submittedAt).toLocaleDateString('en-US', {year: 'numeric', month: 'short', day: 'numeric'})}</div>

                                <div class="agreement-status">
                                    <span class="signature-badge">✓ Both Signed</span>
                                </div>

                                <h3>Client Signature</h3>
                                <div class="signature-preview">
                                    <img src="${agreement.clientSignature}" alt="Client Signature">
                                </div>

                                <h3 style="margin-top: 18px;">✓ Authorized by Host</h3>
                                <div class="signature-preview" style="background: rgba(217, 199, 168, 0.1); color: var(--primary); font-weight: 600;">
                                    Pre-Authorized
                                </div>

                                <button class="view-btn">View Full Agreement</button>
                            </div>
                        `).join('')}
                </div>
            `;
        }

        function viewAgreement(id) {
            const agreement = agreementsData.find(a => a.id === id);
            if (!agreement) return;

            const detailsBody = document.getElementById('detailsBody');
            detailsBody.innerHTML = `
                <div class="signature-display">
                    <h3>📝 Client Signature</h3>
                    <img src="${agreement.clientSignature}" alt="Client Signature" style="max-height: 250px;">
                    <div class="signature-date">Signed: ${new Date(agreement.clientDate).toLocaleDateString('en-US', {year: 'numeric', month: 'long', day: 'numeric'})}</div>
                </div>

                <div class="signature-display">
                    <h3>🏢 Authorized by Host (AnQa Khans)</h3>
                    <div style="text-align: center; padding: 40px; background: rgba(217, 199, 168, 0.1); border-radius: 6px; border: 1px dashed var(--primary);">
                        <div style="font-size: 48px; margin-bottom: 12px;">✓</div>
                        <p style="font-weight: 600; color: var(--primary); text-transform: uppercase; letter-spacing: 1px;">Pre-Authorized Representative</p>
                    </div>
                    <div class="signature-date">Authorized: ${new Date(agreement.hostDate).toLocaleDateString('en-US', {year: 'numeric', month: 'long', day: 'numeric'})}</div>
                </div>

                <div style="background: rgba(217, 199, 168, 0.1); padding: 16px; border-radius: 8px; margin-top: 20px;">
                    <p style="font-size: 12px; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: 600;">Agreement Status</p>
                    <p style="font-size: 14px; color: var(--success); font-weight: 600;">✓ Fully Signed and Binding</p>
                    <p style="font-size: 11px; color: var(--text-light); margin-top: 8px;">Submitted: ${new Date(agreement.submittedAt).toLocaleString('en-US', {year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'})}</p>
                </div>
            `;

            document.getElementById('detailModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('show');
        }

        function refreshData() {
            loadAgreements();
            showNotification('✓ Data refreshed', 'success');
        }

        function showNotification(message, type = 'success') {
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            notif.textContent = message;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        window.addEventListener('load', () => {
            if (sessionStorage.getItem('adminLoggedIn') === 'true') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadAgreements();
            }
        });

        setInterval(() => {
            if (sessionStorage.getItem('adminLoggedIn') === 'true') {
                loadAgreements();
            }
        }, 30000);

        document.getElementById('passwordInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });
    </script>
</body>
</html>
