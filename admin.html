<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnQa Khans - Admin Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/SheetJS/0.18.5/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #D4A017;
            --primary-light: #FFD700;
            --primary-dark: #B8860B;
            --secondary: #10b981;
            --bg: #f8fafc;
            --bg-white: #ffffff;
            --text: #1f2937;
            --text-light: #6b7280;
            --border: #e5e7eb;
            --accent: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #f1f5f9 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, var(--bg) 0%, #f1f5f9 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .login-screen.hidden {
            display: none;
        }

        .login-box {
            background: var(--bg-white);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 50px 40px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .login-box h1 {
            font-size: 28px;
            color: var(--primary);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .login-box p {
            color: var(--text-light);
            margin-bottom: 30px;
            font-size: 13px;
        }

        .login-field {
            margin-bottom: 20px;
        }

        .login-field label {
            display: block;
            font-size: 12px;
            color: var(--text);
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .login-field input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            background: var(--bg-white);
            color: var(--text);
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .login-field input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(37, 99, 235, 0.4);
        }

        .login-error {
            color: var(--accent);
            font-size: 12px;
            margin-top: 10px;
            display: none;
        }

        .login-error.show {
            display: block;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 16px;
            background: var(--bg-white);
            border: 1.5px solid var(--border);
            border-radius: 6px;
            color: var(--primary);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .btn.logout {
            background: transparent;
            color: var(--accent);
            border-color: rgba(239, 68, 68, 0.3);
        }

        .btn.logout:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .btn.export {
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
            color: white;
            border: none;
        }

        .btn.export:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-white);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.1);
        }

        .stat-card .number {
            font-size: 36px;
            font-weight: 800;
            color: var(--primary);
            margin: 10px 0;
        }

        .stat-card .label {
            font-size: 11px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .stat-card .icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .bookings-table {
            background: var(--bg-white);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .table-header {
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.05), rgba(16, 185, 129, 0.05));
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: grid;
            grid-template-columns: 2fr 2fr 2fr 1.5fr 1fr;
            gap: 15px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            color: var(--primary);
        }

        .booking-row {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            display: grid;
            grid-template-columns: 2fr 2fr 2fr 1.5fr 1fr;
            gap: 15px;
            align-items: center;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .booking-row:hover {
            background: rgba(37, 99, 235, 0.03);
        }

        .booking-row:last-child {
            border-bottom: none;
        }

        .brand-name {
            font-weight: 700;
            color: var(--text);
        }

        .contact-info {
            font-size: 12px;
            color: var(--text-light);
            line-height: 1.5;
        }

        .shoot-date {
            color: var(--primary);
            font-weight: 600;
        }

        .action-btn {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--primary);
            cursor: pointer;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            background: var(--primary);
            color: white;
        }

        .action-btn.delete {
            color: var(--accent);
            border-color: rgba(239, 68, 68, 0.3);
        }

        .action-btn.delete:hover {
            background: var(--accent);
            color: white;
        }

        .empty-state {
            padding: 60px 40px;
            text-align: center;
            color: var(--text-light);
        }

        .empty-state h3 {
            font-size: 18px;
            color: var(--text);
            margin-bottom: 8px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 9998;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--bg-white);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 36px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .modal-header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 18px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            color: var(--primary);
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 28px;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .modal-close:hover {
            color: var(--accent);
        }

        .detail-item {
            margin-bottom: 18px;
        }

        .detail-label {
            font-size: 10px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .detail-value {
            color: var(--text);
            font-size: 14px;
            line-height: 1.6;
            padding: 10px 12px;
            background: var(--bg);
            border-left: 2px solid var(--primary);
            border-radius: 4px;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 20px;
            background: var(--success);
            color: white;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            animation: slideInRight 0.4s ease-out;
            z-index: 10000;
            max-width: 90%;
            font-weight: 600;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .notification.error {
            background: var(--accent);
        }

        @media (max-width: 1000px) {
            .table-header,
            .booking-row {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .table-header {
                display: none;
            }

            .booking-row {
                border: 1px solid var(--border);
                border-radius: 8px;
                margin-bottom: 12px;
                padding: 16px;
            }

            .booking-row::before {
                content: attr(data-label);
                display: block;
                font-weight: 700;
                color: var(--primary);
                font-size: 11px;
                text-transform: uppercase;
                margin-bottom: 6px;
                letter-spacing: 1px;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h1>🔐 Admin Access</h1>
            <p>Enter password to access dashboard</p>

            <div class="login-field">
                <label for="passwordInput">Admin Password</label>
                <input
                    type="password"
                    id="passwordInput"
                    placeholder="Enter password"
                    autocomplete="off"
                >
            </div>

            <button class="login-btn" onclick="checkPassword()">Login</button>

            <div class="login-error" id="loginError">❌ Incorrect password</div>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div class="container" id="dashboard" style="display: none;">
        <div class="header">
            <h1>📊 Dashboard</h1>
            <div class="header-actions">
                <button class="btn export" onclick="exportToExcel()">📥 Export to Excel</button>
                <button class="btn" onclick="refreshData()">🔄 Refresh</button>
                <button class="btn logout" onclick="logout()">🚪 Logout</button>
            </div>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="icon">📝</div>
                <div class="label">Total Bookings</div>
                <div class="number" id="totalBookings">0</div>
            </div>
            <div class="stat-card">
                <div class="icon">📅</div>
                <div class="label">This Month</div>
                <div class="number" id="monthBookings">0</div>
            </div>
            <div class="stat-card">
                <div class="icon">⏳</div>
                <div class="label">Pending Review</div>
                <div class="number" id="pendingBookings">0</div>
            </div>
            <div class="stat-card">
                <div class="icon">🏢</div>
                <div class="label">Unique Brands</div>
                <div class="number" id="uniqueBrands">0</div>
            </div>
        </div>

        <div class="bookings-table">
            <div class="table-header">
                <div>Brand</div>
                <div>Contact Info</div>
                <div>Email & Phone</div>
                <div>Shoot Date</div>
                <div>Action</div>
            </div>
            <div id="bookingsContainer"></div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Booking Details</h2>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div id="detailsBody"></div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = 'anqakhans2026';
        let bookingsData = [];

        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            const loginError = document.getElementById('loginError');

            if (input === ADMIN_PASSWORD) {
                sessionStorage.setItem('adminLoggedIn', 'true');
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadBookings();
            } else {
                loginError.classList.add('show');
                document.getElementById('passwordInput').value = '';
                setTimeout(() => loginError.classList.remove('show'), 3000);
            }
        }

        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('passwordInput').value = '';
        }

        function loadBookings() {
            const saved = localStorage.getItem('anqakhans_bookings');
            bookingsData = saved ? JSON.parse(saved) : [];
            renderDashboard();
        }

        function renderDashboard() {
            updateStats();
            renderBookings();
        }

        function updateStats() {
            const now = new Date();
            const currentMonth = now.getMonth();
            const currentYear = now.getFullYear();

            const totalBookings = bookingsData.length;
            const monthBookings = bookingsData.filter(b => {
                const date = new Date(b.submittedAt);
                return date.getMonth() === currentMonth && date.getFullYear() === currentYear;
            }).length;

            const uniqueBrands = new Set(bookingsData.map(b => b.brandName)).size;

            document.getElementById('totalBookings').textContent = totalBookings;
            document.getElementById('monthBookings').textContent = monthBookings;
            document.getElementById('pendingBookings').textContent = totalBookings;
            document.getElementById('uniqueBrands').textContent = uniqueBrands;
        }

        function renderBookings() {
            const container = document.getElementById('bookingsContainer');

            if (bookingsData.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 48px; margin-bottom: 16px;">📋</div>
                        <h3>No bookings yet</h3>
                        <p>New booking requests will appear here</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = bookingsData
                .sort((a, b) => new Date(b.submittedAt) - new Date(a.submittedAt))
                .map(booking => `
                    <div class="booking-row">
                        <div class="brand-name">${booking.brandName}</div>
                        <div class="contact-info">
                            <div>${booking.contactPerson}</div>
                        </div>
                        <div class="contact-info">
                            <div>${booking.email}</div>
                            <div>${booking.phone}</div>
                        </div>
                        <div class="shoot-date">${new Date(booking.shootDate).toLocaleDateString('en-US', {year: 'numeric', month: 'short', day: 'numeric'})}</div>
                        <div style="display: flex; gap: 6px;">
                            <button class="action-btn" onclick="viewDetails(${booking.id})">View</button>
                            <button class="action-btn delete" onclick="deleteBooking(${booking.id})">Delete</button>
                        </div>
                    </div>
                `).join('');
        }

        function viewDetails(id) {
            const booking = bookingsData.find(b => b.id === id);
            if (!booking) return;

            const detailsBody = document.getElementById('detailsBody');
            detailsBody.innerHTML = `
                <div class="detail-item">
                    <div class="detail-label">Brand Name</div>
                    <div class="detail-value">${booking.brandName}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Shoot Purpose</div>
                    <div class="detail-value">${booking.purpose || 'Not specified'}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Contact Person</div>
                    <div class="detail-value">${booking.contactPerson}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Email</div>
                    <div class="detail-value"><a href="mailto:${booking.email}" style="color: var(--primary); text-decoration: none;">${booking.email}</a></div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Phone</div>
                    <div class="detail-value"><a href="tel:${booking.phone}" style="color: var(--primary); text-decoration: none;">${booking.phone}</a></div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Studio / Location</div>
                    <div class="detail-value">${booking.unit}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Shoot Date</div>
                    <div class="detail-value">${new Date(booking.shootDate).toLocaleDateString('en-US', {year: 'numeric', month: 'long', day: 'numeric'})}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Team Size</div>
                    <div class="detail-value">${booking.teamSize} members</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Additional Notes</div>
                    <div class="detail-value">${booking.notes || 'None provided'}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Submitted</div>
                    <div class="detail-value">${new Date(booking.submittedAt).toLocaleString('en-US', {year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'})}</div>
                </div>
            `;

            document.getElementById('detailModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('show');
        }

        function deleteBooking(id) {
            if (confirm('⚠️ Are you sure you want to delete this booking?\n\nThis action cannot be undone!')) {
                bookingsData = bookingsData.filter(b => b.id !== id);
                localStorage.setItem('anqakhans_bookings', JSON.stringify(bookingsData));
                renderDashboard();
                closeModal();
                showNotification('✓ Booking deleted', 'success');
            }
        }

        function exportToExcel() {
            if (bookingsData.length === 0) {
                showNotification('❌ No bookings to export', 'error');
                return;
            }

            const exportData = bookingsData.map(b => ({
                'Brand Name': b.brandName,
                'Contact Person': b.contactPerson,
                'Email': b.email,
                'Phone': b.phone,
                'Studio Address': b.unit,
                'Shoot Date': new Date(b.shootDate).toLocaleDateString('en-US'),
                'Team Size': b.teamSize,
                'Purpose': b.purpose || '',
                'Notes': b.notes || '',
                'Submitted': new Date(b.submittedAt).toLocaleString('en-US')
            }));

            const ws = XLSX.utils.json_to_sheet(exportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Bookings');

            // Auto-width columns
            const colWidths = [
                { wch: 20 },
                { wch: 15 },
                { wch: 25 },
                { wch: 15 },
                { wch: 25 },
                { wch: 12 },
                { wch: 10 },
                { wch: 20 },
                { wch: 30 },
                { wch: 20 }
            ];
            ws['!cols'] = colWidths;

            const fileName = `AnQaKhans-Bookings-${new Date().toISOString().split('T')[0]}.xlsx`;
            XLSX.writeFile(wb, fileName);

            showNotification('✓ File exported successfully!', 'success');
        }

        function refreshData() {
            loadBookings();
            showNotification('✓ Data refreshed', 'success');
        }

        function showNotification(message, type = 'success') {
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            notif.textContent = message;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        window.addEventListener('load', () => {
            if (sessionStorage.getItem('adminLoggedIn') === 'true') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadBookings();
            }
        });

        setInterval(() => {
            if (sessionStorage.getItem('adminLoggedIn') === 'true') {
                loadBookings();
            }
        }, 30000);

        document.getElementById('passwordInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });
    </script>
</body>
</html>
